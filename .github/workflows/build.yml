name: Build Anti-Share Bypass

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up MinGW
      run: choco install mingw-w64 -y
      
    - name: Build executable
      run: |
        cd ${{ github.workspace }}
        build.bat
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: anti-share-bypass-exe
        path: anti_share_bypass.exe
